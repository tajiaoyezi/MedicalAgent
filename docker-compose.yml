services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medoffice
      POSTGRES_PASSWORD: medoffice
      POSTGRES_DB: medoffice
    ports:
      - "5432:5432"
    volumes:
      - medoffice_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medoffice"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - medoffice_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  medoffice_pg:
  medoffice_minio:
